<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>个人待办提醒助手</title>
    <link rel="stylesheet" href="./styles.css?v=0.4.1">
  </head>
  <body>
    <main class="shell">
      <section class="capture">
        <div>
          <p class="eyebrow">个人待办提醒助手</p>
          <h1>想到什么，先放进这里。</h1>
        </div>
      </section>

      <section class="captureInput">
        <form id="taskForm" class="composer">
          <div class="modeSwitch" aria-label="记录类型">
            <button type="button" class="modeButton active" data-mode="task">待办</button>
            <button type="button" class="modeButton" data-mode="expense">记账</button>
          </div>
          <p id="modeStatus" class="modeStatus">当前是待办模式，可以记录提醒、重复事项和临时想法。</p>
          <textarea id="taskText" rows="3" placeholder="例如：明天上午 10 点交电费；周五前回复老王；有空整理桌面"></textarea>
          <div class="inlineFields">
            <label>
              标签
              <input id="taskTags" type="text" placeholder="工作, 股票, 家庭">
            </label>
            <label>
              提前提醒
              <input id="reminderMinutesInput" type="number" min="0" max="1440" step="1" placeholder="默认2分钟">
            </label>
          </div>
          <div id="expenseFields" class="inlineFields" hidden>
            <label>
              金额
              <input id="expenseAmount" type="number" inputmode="decimal" min="0" step="0.01" placeholder="38.5">
            </label>
            <label>
              分类
              <input id="expenseCategory" type="text" placeholder="买菜、交通、咖啡">
            </label>
          </div>
          <div class="inlineFields">
            <label>
              重复
              <select id="repeatRule">
                <option value="none">不重复</option>
                <option value="daily">每天</option>
                <option value="weekly">每周</option>
                <option value="monthly">每月</option>
              </select>
            </label>
            <label>
              次数
              <input id="repeatCount" type="number" min="1" max="99" step="1" placeholder="不限">
            </label>
          </div>
          <div class="composerBar">
            <button type="button" id="sketchToggle" class="ghostButton">画个草图</button>
            <div class="formActions">
              <button type="button" id="cancelEdit" class="ghostButton" hidden>取消编辑</button>
              <button type="submit" id="saveTask" class="primaryButton">记下来</button>
            </div>
          </div>
          <div id="sketchPanel" class="sketchPanel" hidden>
            <canvas id="sketchCanvas" width="640" height="260" aria-label="草图画板"></canvas>
            <div class="composerBar">
              <button type="button" id="clearSketch" class="ghostButton">清空草图</button>
              <span class="hint">鼠标或手指都可以画</span>
            </div>
          </div>
          <p id="parseHint" class="hint">会识别：今晚、明早、半小时后、下周一、每周一三五、月底、提前30分钟提醒。</p>
        </form>
      </section>

      <section class="toolStrip" aria-label="实用工具">
        <form id="calculatorForm" class="calculator">
          <label for="calculatorInput">计算器</label>
          <input id="calculatorInput" type="text" inputmode="decimal" placeholder="例如：38.5 + 12 * 2">
          <button type="submit" class="ghostButton">计算</button>
          <strong id="calculatorResult">结果</strong>
        </form>
      </section>

      <section class="dataBar" aria-label="本地数据">
        <div>
          <strong>本地数据</strong>
          <span id="dataStatus">可以导出备份，也可以导入之前的备份文件。</span>
        </div>
        <div class="dataActions">
          <button type="button" id="exportData" class="ghostButton">导出备份</button>
          <button type="button" id="importData" class="ghostButton">导入备份</button>
          <input id="importFile" type="file" accept="application/json" hidden>
        </div>
      </section>

      <section class="reminderBar" aria-label="提醒状态">
        <div>
          <strong>提醒</strong>
          <span id="reminderStatus">默认提前 2 分钟，网页开着时生效。</span>
        </div>
        <button type="button" id="enableReminders" class="ghostButton">开启声音和弹窗</button>
      </section>

      <section class="summary" aria-label="概览">
        <div>
          <strong id="todayCount">0</strong>
          <span>今天</span>
        </div>
        <div>
          <strong id="laterCount">0</strong>
          <span>以后</span>
        </div>
        <div>
          <strong id="overdueCount">0</strong>
          <span>过期</span>
        </div>
        <div>
          <strong id="expenseTotal">0</strong>
          <span>本月支出</span>
        </div>
      </section>

      <nav class="tabs" aria-label="筛选">
        <button class="tab active" data-filter="active">要做</button>
        <button class="tab" data-filter="today">今天</button>
        <button class="tab" data-filter="later">以后</button>
        <button class="tab" data-filter="expense">记账</button>
        <button class="tab" data-filter="history">历史</button>
        <button class="tab" data-filter="done">已完成</button>
      </nav>

      <section class="searchBar" aria-label="搜索">
        <input id="searchInput" type="search" placeholder="搜索内容或标签，例如：股票、家庭、账单">
        <button type="button" id="clearSearch" class="ghostButton">清空</button>
      </section>

      <section id="conflicts" class="conflicts" hidden></section>
      <section class="calendarPanel" aria-label="日历">
        <div class="calendarToolbar">
          <div>
            <strong id="calendarTitle">本月</strong>
            <span id="selectedDayLabel">选择日期查看事项</span>
          </div>
          <div class="calendarControls">
            <button type="button" class="ghostButton" id="calendarToday">今天</button>
            <button type="button" class="ghostButton" id="calendarWeek">本周</button>
            <button type="button" class="ghostButton active" id="calendarMonth">月历</button>
          </div>
        </div>
        <div id="calendarGrid" class="calendarGrid"></div>
      </section>
      <section id="reminderNotice" class="reminderNotice" hidden>
        <div id="reminderMessage"></div>
        <div class="reminderActions">
          <button type="button" class="ghostButton" data-reminder-action="complete">完成</button>
          <button type="button" class="ghostButton" data-reminder-action="snooze">延后10分钟</button>
          <button type="button" class="ghostButton" data-reminder-action="tomorrow">明天再提醒</button>
          <button type="button" class="ghostButton" data-reminder-action="skip">跳过本次</button>
        </div>
      </section>
      <section id="taskList" class="taskList" aria-live="polite"></section>
    </main>

    <template id="taskTemplate">
      <article class="task">
        <button class="checkButton" type="button" aria-label="标记完成"></button>
        <div class="taskBody">
          <p class="taskText"></p>
          <div class="meta"></div>
          <img class="sketchPreview" alt="草图预览" hidden>
        </div>
        <button class="deleteButton" type="button" aria-label="删除">删除</button>
        <button class="editButton" type="button" aria-label="编辑">编辑</button>
      </article>
    </template>

    <script src="./app.js?v=0.4.1" type="module"></script>
  </body>
</html>
