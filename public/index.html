<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>个人待办提醒助手</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="capture">
        <div>
          <p class="eyebrow">个人待办提醒助手</p>
          <h1>想到什么，先放进这里。</h1>
        </div>
      </section>

      <section class="captureInput">
        <form id="taskForm" class="composer">
          <div class="modeSwitch" aria-label="记录类型">
            <button type="button" class="modeButton active" data-mode="task">待办</button>
            <button type="button" class="modeButton" data-mode="expense">记账</button>
          </div>
          <textarea id="taskText" rows="3" placeholder="例如：明天上午 10 点交电费；周五前回复老王；有空整理桌面"></textarea>
          <div id="expenseFields" class="inlineFields" hidden>
            <label>
              金额
              <input id="expenseAmount" type="number" inputmode="decimal" min="0" step="0.01" placeholder="38.5">
            </label>
            <label>
              分类
              <input id="expenseCategory" type="text" placeholder="买菜、交通、咖啡">
            </label>
          </div>
          <div class="inlineFields">
            <label>
              重复
              <select id="repeatRule">
                <option value="none">不重复</option>
                <option value="daily">每天</option>
                <option value="weekly">每周</option>
                <option value="monthly">每月</option>
              </select>
            </label>
            <label>
              次数
              <input id="repeatCount" type="number" min="1" max="99" step="1" placeholder="不限">
            </label>
          </div>
          <div class="composerBar">
            <button type="button" id="sketchToggle" class="ghostButton">画个草图</button>
            <button type="submit" class="primaryButton">记下来</button>
          </div>
          <div id="sketchPanel" class="sketchPanel" hidden>
            <canvas id="sketchCanvas" width="640" height="260" aria-label="草图画板"></canvas>
            <div class="composerBar">
              <button type="button" id="clearSketch" class="ghostButton">清空草图</button>
              <span class="hint">鼠标或手指都可以画</span>
            </div>
          </div>
          <p id="parseHint" class="hint">会识别：今天、明天、后天、周五、上午 10 点、晚上 8:30、6月30日、提前30分钟提醒。</p>
        </form>
      </section>

      <section class="toolStrip" aria-label="实用工具">
        <form id="calculatorForm" class="calculator">
          <label for="calculatorInput">计算器</label>
          <input id="calculatorInput" type="text" inputmode="decimal" placeholder="例如：38.5 + 12 * 2">
          <button type="submit" class="ghostButton">计算</button>
          <strong id="calculatorResult"></strong>
        </form>
      </section>

      <section class="reminderBar" aria-label="提醒状态">
        <div>
          <strong>提醒</strong>
          <span id="reminderStatus">默认提前 2 分钟，网页开着时生效。</span>
        </div>
        <button type="button" id="enableReminders" class="ghostButton">开启声音和弹窗</button>
      </section>

      <section class="summary" aria-label="概览">
        <div>
          <strong id="todayCount">0</strong>
          <span>今天</span>
        </div>
        <div>
          <strong id="laterCount">0</strong>
          <span>以后</span>
        </div>
        <div>
          <strong id="overdueCount">0</strong>
          <span>过期</span>
        </div>
        <div>
          <strong id="expenseTotal">0</strong>
          <span>本月支出</span>
        </div>
      </section>

      <nav class="tabs" aria-label="筛选">
        <button class="tab active" data-filter="active">要做</button>
        <button class="tab" data-filter="today">今天</button>
        <button class="tab" data-filter="later">以后</button>
        <button class="tab" data-filter="expense">记账</button>
        <button class="tab" data-filter="history">历史</button>
        <button class="tab" data-filter="done">已完成</button>
      </nav>

      <section id="conflicts" class="conflicts" hidden></section>
      <section id="reminderNotice" class="reminderNotice" hidden></section>
      <section id="taskList" class="taskList" aria-live="polite"></section>
    </main>

    <template id="taskTemplate">
      <article class="task">
        <button class="checkButton" type="button" aria-label="标记完成"></button>
        <div class="taskBody">
          <p class="taskText"></p>
          <div class="meta"></div>
          <img class="sketchPreview" alt="草图预览" hidden>
        </div>
        <button class="deleteButton" type="button" aria-label="删除">删除</button>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
